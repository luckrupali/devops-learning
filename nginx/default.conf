# ============================================================
# nginx/default.conf — NGINX CONFIGURATION
# ============================================================
# Nginx is the "front door" of your application.
# It does TWO jobs:
#
# JOB 1: Serve the frontend (dist/ folder = static HTML/CSS/JS files)
#   When someone visits http://your-ip/ → Nginx sends index.html
#
# JOB 2: Reverse Proxy for API requests
#   When frontend calls http://your-ip/api/tasks → Nginx forwards
#   that request to Node.js running on port 5000
#
# Without Nginx:
#   Frontend would be on port 3000, Backend on port 5000
#   Users would need to know both ports (bad experience)
#
# With Nginx:
#   Everything is on port 80 (standard HTTP port)
#   Nginx decides where to send each request based on the URL path
#
# WHERE THIS FILE GOES ON EC2 (Ubuntu):
#   /etc/nginx/sites-available/default
#   Then: sudo systemctl restart nginx
# ============================================================

server {
    # Listen on port 80 (HTTP — standard web port)
    # When someone types http://your-ec2-ip in a browser,
    # it connects to port 80 by default
    listen 80;

    # Server name — your domain or IP
    # For learning, use _ (matches any hostname)
    server_name _;

    # ----- JOB 1: Serve Frontend (React dist folder) -----
    # Any request that doesn't match /api/* gets the frontend files
    location / {
        # Where the dist/ files are on the EC2 server
        # NOTE: Ubuntu default user is "ubuntu" (not "ec2-user")
        root /home/ubuntu/client/dist;

        # Default file to serve
        index index.html;

        # try_files explained:
        # 1. Try to find the exact file requested ($uri)
        # 2. Try to find it as a directory ($uri/)
        # 3. If nothing found, serve index.html (React handles routing)
        #
        # Why? React is a "Single Page App":
        # - There's only ONE HTML file (index.html)
        # - JavaScript handles showing different "pages"
        # - If user goes to /about, there's no about.html file
        # - Nginx must serve index.html, then React shows the /about page
        try_files $uri $uri/ /index.html;
    }

    # ----- JOB 2: Reverse Proxy for API -----
    # Any request starting with /api/ gets forwarded to Node.js
    location /api/ {
        # Forward the request to Node.js on port 5000
        # "proxy_pass" = "send this request to another server"
        proxy_pass http://localhost:5000;

        # Pass along the original request headers
        # So Node.js knows who the real client is
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ----- Health check for Nginx itself -----
    location /nginx-health {
        return 200 'nginx is running';
        add_header Content-Type text/plain;
    }
}
