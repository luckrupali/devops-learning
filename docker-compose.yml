# ============================================================
# docker-compose.yml — ORCHESTRATE MULTIPLE CONTAINERS
# ============================================================
# Instead of running each container manually with long "docker run" commands,
# Docker Compose lets you define ALL containers in ONE file and start them
# with a single command: docker compose up
#
# Think of it as:
#   - Dockerfile = recipe for ONE dish
#   - docker-compose.yml = menu for the entire meal
#
# This file defines TWO services (containers):
#   1. backend  — Node.js API (port 5000)
#   2. frontend — Nginx serving React (port 80)
#
# USAGE:
#   docker compose up -d          # Start everything (detached)
#   docker compose down           # Stop everything
#   docker compose logs -f        # See all logs
#   docker compose ps             # See running containers
#   docker compose up -d --build  # Rebuild and restart
# ============================================================

services:
  # ==================== BACKEND ====================
  backend:
    # Build the image from app/backend/Dockerfile
    build:
      context: ./app/backend
      dockerfile: Dockerfile

    # Name the running container (easier to identify)
    container_name: taskmanager-backend

    # Map port: HOST:CONTAINER
    # localhost:5000 → container's port 5000
    ports:
      - "5000:5000"

    # Environment variables (passed into the container)
    # These override what's in .env inside the container
    environment:
      - MONGODB_URI=${MONGODB_URI}
      - PORT=5000

    # Restart the container if it crashes
    restart: unless-stopped

    # Health check — Docker will mark container as "healthy" or "unhealthy"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ==================== FRONTEND ====================
  frontend:
    # Build the image from app/frontend/Dockerfile
    build:
      context: ./app/frontend
      dockerfile: Dockerfile

    # Name the running container
    container_name: taskmanager-frontend

    # Map port: HOST:CONTAINER
    # localhost:80 → container's port 80
    ports:
      - "80:80"

    # Frontend depends on backend being available
    # Docker starts backend BEFORE frontend
    depends_on:
      backend:
        condition: service_healthy

    # Restart if it crashes
    restart: unless-stopped
