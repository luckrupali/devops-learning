# Nginx config for the frontend container
# Serves React app and forwards /api requests to the backend container

server {
    listen 80;
    server_name _;

    # Serve React static files
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Forward API calls to the backend container
    # "backend" is the service name defined in docker-compose.yml
    # Docker's internal DNS resolves "backend" → backend container IP
    location /api/ {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
